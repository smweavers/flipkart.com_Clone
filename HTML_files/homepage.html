<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart.com_Clone</title>
    <link rel="stylesheet" href="css_main.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>
    <main>
        <div class="header">
            <div class="top_header">
                <div class="left_logos">
                    <a href="" class="flipkart_logo">
                        <img src="flipkart icon.webp" >
                        <img src="Flipkart logo.webp" style="height: 20px; margin-left: 10px;">
                    </a>
                    <a href="" class="travel_logo">
                        <img src="Travel.webp" alt="">
                        <img src="traveltext.webp" style="height: 23px; margin-left: 10px;">
                    </a>
                    <a href="" class="grocery_logo">
                        <img src="grocery icon.webp" style="height: 20px;">
                        <img src="grocery text.webp" style="margin-left: 10px;height: 22px; ">
                    </a>
                </div>
                <div class="location">
                    <i class="ri-map-pin-2-fill location_icon"></i>
                    <p>Location not set</p>
                    <a href="">Select delivery location</a>
                    <i class="ri-arrow-right-s-line delivery_arrow" style="margin-top: 5px;color: #1257e1;"></i>
                </div>
            </div>
            <div class="bottom_header">
                <div class="searchbar">
                    <a href="" style="text-decoration: none;"><i class="ri-search-line"></i></a>
                    <input class="searchbox" type="text" placeholder="Search for Products,Brands and More">
                </div>
                <div class="LMC">
                    <a href="">
                        <div class="login">
                        <i class="ri-user-line" style="font-size: 18px; border: 1.5px solid black;border-radius: 50%;margin-right: 5px;"></i>
                        <p>Login</p>
                        <i class="ri-arrow-down-s-line"></i>
                    </div>
                    </a>
                    <a href="">
                        <div class="more">
                        <p>More</p>
                        <i class="ri-arrow-down-s-line"></i>
                    </div>
                    </a>
                    <a href="">
                        <div class="cart">
                        <i class="ri-shopping-cart-2-line" style="margin-right: 10px;"></i>
                        <p>cart</p>
                    </div>
                    </a>
                </div>
            </div>
        </div>
        <div class="header_fake1">
            
        </div>
        <div class="header_fake2">
            <div class="horizontal_pannel">
                <a href="" class="pannel_menu" style="margin-left: 20px;">
                    <img src="For you.svg" alt="">
                    <p>For You</p>
                </a>
                <a href="" class="pannel_menu">
                    <img src="Fashion.svg" alt="">
                    <p>Fashion</p>
                </a>
                <a href="" class="pannel_menu">
                    <img src="Mobiles.svg" alt="">
                    <p>Mobiles</p>
                </a>
                <a href="" class="pannel_menu">
                    <img src="Beauty.svg" alt="">
                    <p>Beauty</p>
                </a>
                <a href="" class="pannel_menu">
                    <img src="Electronics.svg" alt="">
                    <p>Electronics</p>
                </a>
                <a href="" class="pannel_menu">
                    <img src="Home.svg" >
                    <p style="margin-top: 1.3px;">Home</p>
                </a>
                <a href="" class="pannel_menu">
                    <img src="Appliances.svg" >
                    <p>Appliances</p>
                </a>
                <a href="" class="pannel_menu">
                    <img src="Toys & Baby.svg" alt="">
                    <p>Toys, Ba...</p>
                </a>
                <a href="" class="pannel_menu">
                    <img src="Food & Health.svg" alt="">
                    <p>Food & H...</p>
                </a>
                <a href="" class="pannel_menu">
                    <img src="Auto Accessories.svg" alt="">
                    <p>Auto Acc...</p>
                </a>
                <a href="" class="pannel_menu" >
                    <img src="2 wheelers.svg" alt="">
                    <p>Two Wheele...</p>
                </a>
                <a href="" class="pannel_menu">
                    <img src="Sports & Fitness.svg" alt="">
                    <p>Sports &...</p>
                </a>
                <a href="" class="pannel_menu">
                    <img src="books.svg" alt="">
                    <p>Books &...</p>
                </a>
                <a href="" class="pannel_menu" style="margin-right: 20px;">
                    <img src="furniture.svg" alt="">
                    <p>Furniture</p>
                </a>
            </div>
        </div>
        <div class="content">
            <div style="height: 70px;background-color: white;"></div>
        </div>
    </main>
    >    
</body>
<script src="JS_main.js"></script>
</html>
